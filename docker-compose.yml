version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: nightmares-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: nightmares-wiki
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - nightmares-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: nightmares-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      MongoDB__DatabaseName: nightmares-wiki
      ConnectionStrings__MongoDB: mongodb://admin:password@mongodb:27017/nightmares-wiki?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nightmares-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: nightmares-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - api
    networks:
      - nightmares-network
    restart: unless-stopped

volumes:
  mongo_data:
  mongo_config:

networks:
  nightmares-network:
    driver: bridge
